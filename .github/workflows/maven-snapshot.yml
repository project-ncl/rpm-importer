name: Build snapshot version and upload to Maven Central

permissions: {}

on:
  push:
    branches: ["main"]
    paths-ignore: ["LICENSE", "README.md"]

jobs:
  call-snapshot-job:
    uses: project-ncl/shared-github-actions/.github/workflows/maven-snapshot.yml@c32f5377788ce8ee9dd823babd583c2dd18604da # v0.0.20
    with:
      project_name: "project-ncl/rpm-importer"
      snapshot_deploy_command: "mvn -B -V -Pjboss-release deploy"
    secrets:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      QUAY_DEVEL_USERNAME: ${{ secrets.QUAY_DEVEL_USERNAME }}
      QUAY_DEVEL_PASSWORD: ${{ secrets.QUAY_DEVEL_PASSWORD }}
