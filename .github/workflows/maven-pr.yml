name: Java CI with Maven

permissions:
  contents: read

on:
  pull_request:
    branches: ["*"]
    paths-ignore: ["LICENSE", "README.md"]

jobs:
  call-maven-ci:
    uses: project-ncl/shared-github-actions/.github/workflows/maven-ci.yml@70502d0c707f7d7abb41b02af80fb094a022a760 # main
    with:
      build_command: "mvn -B -V install -Dvalidate-format"
      upload_artifacts: true
