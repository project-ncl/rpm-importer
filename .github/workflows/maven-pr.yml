name: Java CI with Maven

permissions:
  contents: read

on:
  pull_request:
    branches: ["*"]
    paths-ignore: ["LICENSE", "README.md"]

jobs:
  call-maven-ci:
    uses: project-ncl/shared-github-actions/.github/workflows/maven-ci.yml@95987c02b166e549f5f5506353cd3684313de523 # main
    with:
      build_command: "mvn -B -V install -Dvalidate-format"
      upload_artifacts: true
