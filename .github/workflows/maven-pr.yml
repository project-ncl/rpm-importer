name: Java CI with Maven

permissions:
  contents: read

on:
  pull_request:
    branches: ["*"]
    paths-ignore: ["LICENSE", "README.md"]

jobs:
  call-maven-ci:
    uses: project-ncl/shared-github-actions/.github/workflows/maven-ci.yml@5b317ce5a536afbc1dea14f8a9d01184ec931b14 # main
    with:
      build_command: "mvn -B -V install -Dvalidate-format"
      upload_artifacts: true
